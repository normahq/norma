profiles:
  norma:
    tool:
      name: norma
      main: ./cmd/norma
    version:
      source: fixed
      fixed: 0.0.1
    targets:
      - os: darwin
        arch: amd64
      - os: darwin
        arch: arm64
      - os: linux
        arch: amd64
      - os: linux
        arch: arm64
      - os: windows
        arch: amd64
    build:
      ldflags: -s -w
      tags: []
      cgo: false
    distributions:
      npm:
        package: '@normahq/norma'
        registry: https://registry.npmjs.org
        access: public
        include-readme: true

