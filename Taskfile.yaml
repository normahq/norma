# Taskfile for norma build automation
version: '3'

vars:
  BINARY_NAME: norma
  MAIN_PATH: ./cmd/norma
  OUTPUT_DIR: bin
  
tasks:
  default:
    desc: Build the norma binary
    cmds:
      - mkdir -p {{.OUTPUT_DIR}}
      - go build -o {{.OUTPUT_DIR}}/{{.BINARY_NAME}} {{.MAIN_PATH}}
    
  install:
    desc: Build and install norma to GOBIN
    vars:
      VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
    cmds:
      - echo "Installing {{.BINARY_NAME}} version {{.VERSION}}"
      - go install -ldflags "-X main.version={{.VERSION}}" {{.MAIN_PATH}}
    
  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf {{.OUTPUT_DIR}}
      
  test:
    desc: Run tests
    cmds:
      - go test ./...

  test:integration:codex:
    desc: Run Codex ACP proxy integration tests (requires real codex and local config)
    cmds:
      - go test -tags='integration,codex' -count=1 ./cmd/norma/proxy

  test:integration:opencode:
    desc: Run OpenCode ACP integration tests for internal/adk/acpagent (requires real opencode and local config)
    cmds:
      - go test -tags='integration,opencode' -count=1 ./internal/adk/acpagent

  lint:
    desc: Run golangci-lint
    cmds:
      - go tool golangci-lint run
