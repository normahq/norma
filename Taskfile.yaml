# Taskfile for norma build automation
version: '3'

vars:
  NORMA_BINARY_NAME: norma
  NORMA_MAIN_PATH: ./cmd/norma
  RELAY_BINARY_NAME: relay
  RELAY_MAIN_PATH: ./cmd/relay
  OUTPUT_DIR: bin
  
tasks:
  default:
    desc: Build norma and relay binaries
    cmds:
      - mkdir -p {{.OUTPUT_DIR}}
      - go build -o {{.OUTPUT_DIR}}/{{.NORMA_BINARY_NAME}} {{.NORMA_MAIN_PATH}}
      - go build -o {{.OUTPUT_DIR}}/{{.RELAY_BINARY_NAME}} {{.RELAY_MAIN_PATH}}
    
  install:
    desc: Build and install norma and relay to GOBIN
    vars:
      VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
    cmds:
      - echo "Installing {{.NORMA_BINARY_NAME}} version {{.VERSION}}"
      - go install -ldflags "-X main.version={{.VERSION}}" {{.NORMA_MAIN_PATH}}
      - echo "Installing {{.RELAY_BINARY_NAME}} version {{.VERSION}}"
      - go install -ldflags "-X main.version={{.VERSION}}" {{.RELAY_MAIN_PATH}}
    
  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf {{.OUTPUT_DIR}}
      
  test:
    desc: Run tests
    cmds:
      - go test ./...

  test:integration:codex:
    desc: Run Codex ACP proxy integration tests (requires real codex and local config)
    cmds:
      - go test -tags='integration,codex' -count=1 ./cmd/norma/tool

  test:integration:opencode:
    desc: Run OpenCode ACP integration tests for internal/adk/acpagent (requires real opencode and local config)
    cmds:
      - go test -tags='integration,opencode' -count=1 ./internal/adk/acpagent

  lint:
    desc: Run golangci-lint
    cmds:
      - go tool golangci-lint run
