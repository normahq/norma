# Norma Relay Bot Configuration
# Environment variables override these settings with NORMA_ prefix
# Example: NORMA_RELAY_TELEGRAM_TOKEN=my-token

relay:
  telegram:
    # Telegram bot token (required)
    # Set via NORMA_RELAY_TELEGRAM_TOKEN env var
    token: ""

    # Receiver mode: polling (default) or webhook
    receiver_mode: "polling"

    # Optional webhook configuration
    webhook_token: ""
    webhook_url: ""

  auth:
    # Owner token is generated at runtime (one-time use)
    owner_token: ""
    owner_id: 0

  logger:
    level: "info"
    pretty: true

  # Internal MCP servers to start with relay lifecycle.
  # Server implementations are wired incrementally.
  internal_mcp:
    servers: []
