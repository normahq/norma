# Generated by "omnidist ci". Re-run the command to refresh this workflow.
name: omnidist-release-acp-dump
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - uses: actions/setup-node@v4
      - name: Install omnidist
        run: npm install -g '@omnidist/omnidist@0.1.24'
      - name: Build artifacts
        run: omnidist --profile 'acp-dump' build
      - name: Stage artifacts
        run: omnidist --profile 'acp-dump' npm stage
      - name: Verify artifacts
        run: omnidist --profile 'acp-dump' npm verify
      - name: Pack staged artifacts
        run: tar -czf omnidist-staged.tgz .omnidist/acp-dump
      - name: Upload staged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omnidist-staged
          path: omnidist-staged.tgz
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: .omnidist/acp-dump/dist/**/*
          if-no-files-found: error

  publish_npm:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NPM_PUBLISH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - name: Install omnidist
        run: npm install -g '@omnidist/omnidist@0.1.24'
      - name: Download staged artifacts
        uses: actions/download-artifact@v4
        with:
          name: omnidist-staged
      - name: Restore staged artifacts
        run: tar -xzf omnidist-staged.tgz
      - name: Publish npm artifacts
        run: omnidist --profile 'acp-dump' npm publish
