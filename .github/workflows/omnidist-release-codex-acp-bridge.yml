# Generated by "omnidist ci". Re-run the command to refresh this workflow.
name: omnidist-release-codex-acp-bridge
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - uses: actions/setup-node@v4
      - name: Install omnidist
        run: npm install -g '@omnidist/omnidist@0.1.24'
      - name: Build artifacts
        run: omnidist --profile 'codex-acp-bridge' build
      - name: Stage artifacts
        run: omnidist --profile 'codex-acp-bridge' stage
      - name: Verify artifacts
        run: omnidist --profile 'codex-acp-bridge' verify
      - name: Pack staged artifacts
        run: tar -czf omnidist-staged.tgz .omnidist/codex-acp-bridge
      - name: Upload staged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omnidist-staged
          path: omnidist-staged.tgz
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: .omnidist/codex-acp-bridge/dist/**/*
          if-no-files-found: error

  publish_npm:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NPM_PUBLISH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - name: Install omnidist
        run: npm install -g '@omnidist/omnidist@0.1.24'
      - name: Download staged artifacts
        uses: actions/download-artifact@v4
        with:
          name: omnidist-staged
      - name: Restore staged artifacts
        run: tar -xzf omnidist-staged.tgz
      - name: Publish npm artifacts
        run: omnidist --profile 'codex-acp-bridge' npm publish

  publish_uv:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      UV_PUBLISH_TOKEN: ${{ secrets.UV_PUBLISH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install omnidist
        run: npm install -g '@omnidist/omnidist@0.1.24'
      - name: Download staged artifacts
        uses: actions/download-artifact@v4
        with:
          name: omnidist-staged
      - name: Restore staged artifacts
        run: tar -xzf omnidist-staged.tgz
      - name: Publish uv artifacts
        run: omnidist --profile 'codex-acp-bridge' uv publish


  release:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: .omnidist/codex-acp-bridge/dist
          merge-multiple: true
      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          while IFS= read -r -d '' f; do
            rel="${f#.omnidist/codex-acp-bridge/dist/}"
            os="${rel%%/*}"
            rem="${rel#*/}"
            arch="${rem%%/*}"
            name="${rel##*/}"
            ext=""
            base="$name"
            if [[ "$name" == *.exe ]]; then
              ext=".exe"
              base="${name%.exe}"
            fi
            cp "$f" "release-assets/${base}-${os}-${arch}${ext}"
          done < <(find .omnidist/codex-acp-bridge/dist -type f ! -name VERSION -print0 | sort -z)
      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > checksums.txt
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
