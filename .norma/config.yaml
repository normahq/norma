profile: default

agents:
  ainvoke_codex_agent:
    type: exec
    cmd: ["./bin/norma-agent-ainvoke-exec", "--provider", "codex"]
  ainvoke_gemini_agent:
    type: exec
    cmd: ["./bin/norma-agent-ainvoke-exec", "--provider", "gemini"]
  ainvoke_opencode_agent:
    type: exec
    cmd: ["./bin/norma-agent-ainvoke-exec", "--provider", "opencode"]
  openai_primary:
    type: openai
    model: gpt-5
    api_key: sample
    timeout: 60

profiles:
  default:
    pdca:
      plan: ainvoke_opencode_agent
      do: ainvoke_opencode_agent
      check: ainvoke_codex_agent
      act: ainvoke_codex_agent
    planner: ainvoke_codex_agent
  codex:
    pdca:
      plan: ainvoke_codex_agent
      do: ainvoke_codex_agent
      check: ainvoke_codex_agent
      act: ainvoke_codex_agent
    planner: ainvoke_codex_agent
  opencode:
    pdca:
      plan: ainvoke_opencode_agent
      do: ainvoke_opencode_agent
      check: ainvoke_opencode_agent
      act: ainvoke_opencode_agent
    planner: ainvoke_opencode_agent
  gemini:
    pdca:
      plan: ainvoke_gemini_agent
      do: ainvoke_gemini_agent
      check: ainvoke_gemini_agent
      act: ainvoke_gemini_agent
    planner: ainvoke_gemini_agent
  openai:
    pdca:
      plan: openai_primary
      do: openai_primary
      check: openai_primary
      act: openai_primary
    planner: openai_primary

budgets:
  max_iterations: 5
retention:
  keep_last: 50
  keep_days: 30
