profile: default

agents:
  gemini:
    type: gemini_acp
    model: gemini-3-flash-preview
  gemini_plan:
    type: gemini_acp
    model: gemini-3-flash-preview
    mode: plan
  opencode:
    type: opencode_acp
    model: opencode/big-pickle
  opencode_plan:
    type: opencode_acp
    model: opencode/big-pickle
    mode: plan
  copilot:
    type: copilot_acp
  copilot_plan:
    type: copilot_acp
    mode: plan
  opencode_minimax:
    type: opencode_acp
    model: opencode/minimax-m2.5-free
  opencode_minimax_plan:
    type: opencode_acp
    model: opencode/minimax-m2.5-free
    mode: plan
  codex:
    type: codex_acp
    model: gpt-5.4

mcp_servers:
  playground_ping_pong:
    type: stdio
    cmd:
      - go
      - run
      - ./cmd/norma
    args:
      - playground
      - mcp
      - ping-pong

profiles:
  default:
    pdca:
      plan: opencode_acp
      do: opencode_acp
      check: codex_acp
      act: codex_acp
    planner: codex_acp
  codex:
    pdca:
      plan: codex_acp
      do: codex_acp
      check: codex_acp
      act: codex_acp
    planner: codex_acp
  opencode:
    pdca:
      plan: opencode_plan
      do: opencode
      check: opencode_plan
      act: opencode_plan
    planner: opencode_plan
  minimax:
    pdca:
      plan: opencode_minimax_plan
      do: opencode_minimax
      check: opencode_minimax_plan
      act: opencode_minimax_plan
    planner: opencode_minimax_plan
  gemini:
    pdca:
      plan: gemini_plan
      do: gemini
      check: gemini_plan
      act: gemini_plan
    planner: gemini_plan
  copilot:
    pdca:
      plan: copilot_plan
      do: copilot
      check: copilot_plan
      act: copilot_plan
    planner: copilot_plan

budgets:
  max_iterations: 5
retention:
  keep_last: 50
  keep_days: 30
