profile: default

agents:
  ainvoke_codex_agent:
    type: codex
    model: gpt-5.3-codex
  ainvoke_claude_agent:
    type: claude
    model: opus-4.6
  ainvoke_gemini_agent:
    type: gemini
    model: gemini-2.5-flash-lite
  ainvoke_opencode_agent:
    type: opencode
    model: opencode/big-pickle
  ainvoke_opencode_minimax:
    type: opencode
    model: opencode/minimax-m2.5-free
  gemini_api:
    type: gemini_aistudio
    model: gemini-2.5-flash-lite
    api_key: ${GOOGLE_API_KEY}
  gemini_acp:
    type: gemini_acp
    model: gemini-3-flash-preview
  opencode_acp:
    type: opencode_acp
    model: opencode/big-pickle
  codex_acp:
    type: codex_acp
    model: gpt-5.4

  opencode_codex_acp:
    type: opencode_acp
    model: openai/gpt-5.4

profiles:
  default:
    pdca:
      plan: ainvoke_opencode_agent
      do: ainvoke_opencode_agent
      check: ainvoke_codex_agent
      act: ainvoke_codex_agent
    planner: codex_acp
  codex:
    pdca:
      plan: ainvoke_codex_agent
      do: ainvoke_codex_agent
      check: ainvoke_codex_agent
      act: ainvoke_codex_agent
    planner: ainvoke_codex_agent
  claude:
    pdca:
      plan: ainvoke_claude_agent
      do: ainvoke_claude_agent
      check: ainvoke_claude_agent
      act: ainvoke_claude_agent
    planner: ainvoke_claude_agent
  opencode:
    pdca:
      plan: ainvoke_opencode_agent
      do: ainvoke_opencode_agent
      check: ainvoke_opencode_agent
      act: ainvoke_opencode_agent
    planner: ainvoke_opencode_agent
  minimax:
    pdca:
      plan: ainvoke_opencode_minimax
      do: ainvoke_opencode_minimax
      check: ainvoke_opencode_minimax
      act: ainvoke_opencode_minimax
    planner: ainvoke_opencode_minimax
  gemini:
    pdca:
      plan: ainvoke_gemini_agent
      do: ainvoke_gemini_agent
      check: ainvoke_gemini_agent
      act: ainvoke_gemini_agent
    planner: gemini_acp

budgets:
  max_iterations: 5
retention:
  keep_last: 50
  keep_days: 30
