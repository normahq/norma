profile: default

agents:
  ainvoke_codex_agent:
    type: exec
    cmd: ["./bin/norma-agent-ainvoke-exec", "--provider", "codex"]
  ainvoke_opencode_agent:
    type: exec
    cmd: ["./bin/norma-agent-ainvoke-exec", "--provider", "opencode"]
  gemini_primary:
    type: gemini_aistudio
    model: gemini-2.0-flash-exp
    api_key: ${GOOGLE_API_KEY}
  openai_primary:
    type: openai
    model: gpt-4o
    api_key: ${OPENAI_API_KEY}
    timeout: 60

profiles:
  default:
    pdca:
      plan: ainvoke_opencode_agent
      do: ainvoke_opencode_agent
      check: ainvoke_codex_agent
      act: ainvoke_codex_agent
    planner: gemini_primary
  codex:
    pdca:
      plan: ainvoke_codex_agent
      do: ainvoke_codex_agent
      check: ainvoke_codex_agent
      act: ainvoke_codex_agent
    planner: ainvoke_codex_agent
  opencode:
    pdca:
      plan: ainvoke_opencode_agent
      do: ainvoke_opencode_agent
      check: ainvoke_opencode_agent
      act: ainvoke_opencode_agent
    planner: ainvoke_opencode_agent
  gemini:
    pdca:
      plan: gemini_primary
      do: gemini_primary
      check: gemini_primary
      act: gemini_primary
    planner: gemini_primary
  openai:
    pdca:
      plan: openai_primary
      do: openai_primary
      check: openai_primary
      act: openai_primary
    planner: openai_primary

budgets:
  max_iterations: 5
retention:
  keep_last: 50
  keep_days: 30
