profile: default

agents:
  gemini_acp:
    type: gemini_acp
    model: gemini-3-flash-preview
    mcp_servers:
      - playground_ping_pong
  opencode_acp:
    type: opencode_acp
    model: opencode/big-pickle
    mcp_servers:
      - playground_ping_pong
  opencode_minimax:
    type: opencode_acp
    model: opencode/minimax-m2.5-free
    mcp_servers:
      - playground_ping_pong
  codex_acp:
    type: codex_acp
    model: gpt-5.4
    mcp_servers:
      - playground_ping_pong

  opencode_codex_acp:
    type: opencode_acp
    model: openai/gpt-5.4
    mcp_servers:
      - playground_ping_pong

mcp_servers:
  playground_ping_pong:
    type: stdio
    cmd:
      - go
      - run
      - ./cmd/norma
    args:
      - playground
      - mcp
      - ping-pong

profiles:
  default:
    pdca:
      plan: opencode_acp
      do: opencode_acp
      check: codex_acp
      act: codex_acp
    planner: codex_acp
  codex:
    pdca:
      plan: codex_acp
      do: codex_acp
      check: codex_acp
      act: codex_acp
    planner: codex_acp
  opencode:
    pdca:
      plan: opencode_acp
      do: opencode_acp
      check: opencode_acp
      act: opencode_acp
    planner: opencode_acp
  minimax:
    pdca:
      plan: opencode_minimax
      do: opencode_minimax
      check: opencode_minimax
      act: opencode_minimax
    planner: opencode_minimax
  gemini:
    pdca:
      plan: gemini_acp
      do: gemini_acp
      check: gemini_acp
      act: gemini_acp
    planner: gemini_acp

budgets:
  max_iterations: 5
retention:
  keep_last: 50
  keep_days: 30
